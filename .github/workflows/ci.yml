name: IntegrationContinue

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'yarn'

      - name: Dependences install
        run: yarn install --frozen-lockfile

      - name: Lance ESLint
        run: |
          yarn lint 2>&1 | tee lint-output.txt
          exit ${PIPESTATUS[0]}

      - name: Visibilité des erreurs de lint
        if: failure()
        run: |
          echo "::error::ESLint a des erreurs. Voir lint-output.txt pour les détails."
          grep " error " lint-output.txt | while IFS= read -r line; do
            echo "::warning::$line"
          done

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lancer les tests
        run: |
          echo "## Résultats des tests" >> $GITHUB_STEP_SUMMARY
          yarn test 2>&1 | tee test-output.txt
          TEST_EXIT=${PIPESTATUS[0]}
          if [ $TEST_EXIT -eq 0 ]; then
            echo "✅ Tous les tests ont réussi" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Certains tests ont échoué" >> $GITHUB_STEP_SUMMARY
            echo "::error::Les tests ont échoué. Voir test-output.txt pour les détails."
          fi
          exit $TEST_EXIT

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lancer l'audit de sécurité
        run: |
          echo "## Audit de sécurité" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high 2>&1 | tee audit-output.txt
          AUDIT_EXIT=${PIPESTATUS[0]}
          if [ $AUDIT_EXIT -eq 0 ]; then
            echo "✅ Aucune vulnérabilité élevée/critique trouvée" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Vulnérabilités détectées — voir audit-output.txt" >> $GITHUB_STEP_SUMMARY
            echo "::warning::npm audit a détecté des vulnérabilités."
          fi
          exit 0
